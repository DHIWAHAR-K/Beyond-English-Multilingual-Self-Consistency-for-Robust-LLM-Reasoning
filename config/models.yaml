# config/models.yaml
# Central configuration for all model backends and quantization levels.
# Loaded once at startup via yaml.safe_load() and passed to runner factories.
#
# Structure: one entry per model family; quantizations is iterated at runtime.
# The Python loop will call:
#   for precision in model["quantizations"]:
#       runner.load_model(model["model_id"], precision, model["quantization_path"])

# ── Shared generation defaults ────────────────────────────────────────────────
defaults:
  max_tokens: 512
  temperature: 0.0
  top_p: 1.0
  decode_budget: 64   # fixed decode steps used in latency profiling (§4.1)

# ── Models under evaluation ───────────────────────────────────────────────────
# 10 families × 4 quantization levels = 40 experimental configurations.
#
# Gated models (marked *) require `huggingface-cli login` and license acceptance.
# Memory estimate at int4: ~0.5 GB/B params. Verify against your UMA budget.
#
# Fields:
#   name             – slug used in output filenames and plot labels
#   model_id         – exact HuggingFace repo ID (case-sensitive)
#   family           – model family for grouping in analysis
#   params_b         – approximate parameter count in billions
#   backend          – runner to instantiate: mlx | torch_mps | mlc
#   quantizations    – list of precisions to evaluate in order
#   quantization_path – path to pre-quantized weights; null = quantize on load
#   gated            – true if HF license acceptance is required

models:

  # 1. Qwen3-8B — latest Alibaba, top multilingual + thinking mode (29+ langs)
  - name: "qwen3-8b"
    model_id: "Qwen/Qwen3-8B-Instruct"
    family: "qwen"
    params_b: 8
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]
    quantization_path: null
    gated: false

  # 2. Qwen2.5-7B — prior Qwen generation; enables cross-version comparison
  - name: "qwen2.5-7b"
    model_id: "Qwen/Qwen2.5-7B-Instruct"
    family: "qwen"
    params_b: 7
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]
    quantization_path: null
    gated: false

  # 3. Meta Llama 3.1-8B — English-centric baseline * (gated)
  - name: "llama-3.1-8b"
    model_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
    family: "llama"
    params_b: 8
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]
    quantization_path: null
    gated: true

  # 4. Gemma 3-4B — compact Google model; 128K ctx, 140+ languages * (gated)
  - name: "gemma-3-4b"
    model_id: "google/gemma-3-4b-it"
    family: "gemma"
    params_b: 4
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]
    quantization_path: null
    gated: true

  # 5. Gemma 3-12B — medium Google model; cross-size analysis within family * (gated)
  - name: "gemma-3-12b"
    model_id: "google/gemma-3-12b-it"
    family: "gemma"
    params_b: 12
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]  # fp16 requires ≥24 GB UMA
    quantization_path: null
    gated: true

  # 6. Gemma 2-9B — prior Google generation; cross-gen comparison * (gated)
  - name: "gemma-2-9b"
    model_id: "google/gemma-2-9b-it"
    family: "gemma"
    params_b: 9
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]
    quantization_path: null
    gated: true

  # 7. Phi-4-mini — Microsoft, 3.8B reasoning-optimized; MIT license
  - name: "phi-4-mini"
    model_id: "microsoft/Phi-4-mini-instruct"
    family: "phi"
    params_b: 3.8
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]
    quantization_path: null
    gated: false

  # 8. Mistral-7B-v0.3 — classic multilingual European model; Apache 2.0
  - name: "mistral-7b-v0.3"
    model_id: "mistralai/Mistral-7B-Instruct-v0.3"
    family: "mistral"
    params_b: 7
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]
    quantization_path: null
    gated: false

  # 9. Mistral-Small-3.1-24B — large Mistral; 128K ctx, enterprise multilingual
  #    NOTE: fp16 requires ≥48 GB UMA; int4 (~12 GB) fits M1 Max/Ultra 32 GB+
  - name: "mistral-small-3.1-24b"
    model_id: "mistralai/Mistral-Small-3.1-24B-Instruct-2503"
    family: "mistral"
    params_b: 24
    backend: "mlx"
    quantizations: ["int8", "int4", "int2"]   # fp16 omitted: likely OOM on ≤32 GB
    quantization_path: null
    gated: false

  # 10. DeepSeek-R1-Distill-Qwen-7B — reasoning distillation baseline; MIT license
  - name: "deepseek-r1-distill-7b"
    model_id: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
    family: "deepseek"
    params_b: 7
    backend: "mlx"
    quantizations: ["fp16", "int8", "int4", "int2"]
    quantization_path: null
    gated: false

# ── Fallback answer-extraction model ─────────────────────────────────────────
# Lightweight model used when regex fails to parse a CoT answer (§4.3).
# Always loaded via MLX to avoid pulling a second backend into memory.
fallback_extractor:
  name: "qwen2.5-1.5b-extractor"
  model_id: "Qwen/Qwen2.5-1.5B-Instruct"
  family: "qwen"
  params_b: 1.5
  backend: "mlx"
  precision: "int4"
  quantization_path: null
  gated: false