benchmarks:

  mgsm:
    name: Multilingual Grade School Math
    hf_id: juletxara/mgsm
    task_type: math_reasoning
    languages: [en, es, fr, de, ru, zh, ja, th, sw, bn, te]
    n_languages: 11
    examples_per_language: 250
    total_examples: 2750
    split: test
    label_field: answer_number
    label_type: numeric
    input_fields: [question]
    choices_field: null

  xcopa:
    name: Cross-lingual Choice of Plausible Alternatives
    hf_id: cambridgeltl/xcopa
    task_type: commonsense_reasoning
    languages: [et, ht, id, it, qu, sw, ta, th, tr, vi, zh]
    n_languages: 11
    examples_per_language: 500
    total_examples: 5500
    split: test
    label_field: label
    label_type: binary  # 0 or 1
    input_fields: [premise]
    choices_field: [choice1, choice2]

  xstory_cloze:
    name: XStoryCloze
    hf_id: juletxara/xstory_cloze
    task_type: commonsense_reasoning
    languages: [en, zh, es, ar, hi, id, te, sw, eu, my, ru]
    n_languages: 11
    examples_per_language: 500
    total_examples: 5500
    split: eval
    label_field: label
    label_type: binary  # 0 or 1
    input_fields: [input_sentence_1, input_sentence_2, input_sentence_3, input_sentence_4]
    choices_field: [sentence_quiz1, sentence_quiz2]

  xnli:
    name: Cross-lingual Natural Language Inference
    hf_id: facebook/xnli
    task_type: nli
    languages: [en, fr, es, de, el, bg, ru, tr, ar, vi, th, zh, hi, sw, ur]
    n_languages: 15
    examples_per_language: 500
    total_examples: 7500
    split: test
    label_field: label
    label_type: three_way  # entailment / neutral / contradiction
    input_fields: [premise, hypothesis]
    choices_field: null

  ml_nli_26lang:
    name: Multilingual NLI 26 Languages
    hf_id: MoritzLaurer/multilingual-NLI-26lang-2mil7
    task_type: nli
    languages: [ar]  # 500-row Arabic sample from the full 26-language corpus
    n_languages: 1
    examples_per_language: 500
    total_examples: 500
    split: train
    label_field: label
    label_type: three_way
    input_fields: [premise, hypothesis]
    choices_field: null
    notes: "Contains both original English and translated premise-hypothesis pairs"

  global_mmlu_lite:
    name: Global MMLU Lite
    hf_id: CohereLabs/Global-MMLU-Lite
    task_type: multiple_choice_qa
    languages: [ar, bn, cy, de, en, es, fr, hi, id, it, ja, ko, my, pt, sq, sw, yo, zh]
    n_languages: 18
    examples_per_language: 400  # approximate
    total_examples: 7200
    split: test
    label_field: label
    label_type: abcd  # A, B, C, or D
    input_fields: [question]
    choices_field: [option_a, option_b, option_c, option_d]
    subjects: 57

  tydiqa_goldp:
    name: TyDiQA Gold Passage
    hf_id: khalidalt/tydiqa-goldp
    task_type: extractive_qa
    languages: [english, arabic, bengali, finnish, indonesian, japanese, swahili, korean, russian, telugu, thai]
    n_languages: 11
    examples_per_language: 3700  # approximate
    total_examples: 40700
    split: train
    label_field: answers
    label_type: span  # {text: str, answer_start: int}
    input_fields: [passage, question]
    choices_field: null

  mlqa:
    name: Multilingual Question Answering
    hf_id: facebook/mlqa
    task_type: extractive_qa
    languages: [en, ar, de, es, hi, vi, zh]
    n_languages: 7
    examples_per_language_range: [5000, 11590]  # varies by language
    total_examples: 60103
    split: test
    label_field: answers
    label_type: span  # {text: [str], answer_start: [int]}
    input_fields: [context, question]
    choices_field: null
    config_format: "mlqa.{lang}.{lang}"
