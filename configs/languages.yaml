# Union of all languages appearing in any benchmark dataset.
# code:         ISO 639-1 (or ISO 639-3 where no 639-1 exists)
# name:         English name
# family:       Typological language family
# script:       Writing system
# tydiqa_alias: Full-word language name used as the TyDiQA config key (if applicable)
# datasets:     List of benchmark keys (from benchmarks.yaml) the language appears in

languages:

  ar:
    name: Arabic
    family: Semitic
    script: Arabic
    tydiqa_alias: arabic
    datasets: [xnli, ml_nli_26lang, global_mmlu_lite, xstory_cloze, mlqa, tydiqa_goldp]

  bg:
    name: Bulgarian
    family: Indo-European / Slavic
    script: Cyrillic
    datasets: [xnli]

  bn:
    name: Bengali
    family: Indo-European / Indo-Aryan
    script: Bengali
    tydiqa_alias: bengali
    datasets: [mgsm, global_mmlu_lite, tydiqa_goldp]

  cy:
    name: Welsh
    family: Indo-European / Celtic
    script: Latin
    datasets: [global_mmlu_lite]

  de:
    name: German
    family: Indo-European / Germanic
    script: Latin
    datasets: [mgsm, xnli, global_mmlu_lite, mlqa]

  el:
    name: Greek
    family: Indo-European / Hellenic
    script: Greek
    datasets: [xnli]

  en:
    name: English
    family: Indo-European / Germanic
    script: Latin
    tydiqa_alias: english
    datasets: [mgsm, xstory_cloze, xnli, global_mmlu_lite, mlqa, tydiqa_goldp]

  es:
    name: Spanish
    family: Indo-European / Romance
    script: Latin
    datasets: [mgsm, xstory_cloze, xnli, global_mmlu_lite, mlqa]

  et:
    name: Estonian
    family: Uralic / Finnic
    script: Latin
    datasets: [xcopa]

  eu:
    name: Basque
    family: Language isolate
    script: Latin
    datasets: [xstory_cloze]

  fi:
    name: Finnish
    family: Uralic / Finnic
    script: Latin
    tydiqa_alias: finnish
    datasets: [tydiqa_goldp]

  fr:
    name: French
    family: Indo-European / Romance
    script: Latin
    datasets: [mgsm, xnli, global_mmlu_lite]

  hi:
    name: Hindi
    family: Indo-European / Indo-Aryan
    script: Devanagari
    datasets: [xstory_cloze, xnli, global_mmlu_lite, mlqa]

  ht:
    name: Haitian Creole
    family: French Creole
    script: Latin
    datasets: [xcopa]

  id:
    name: Indonesian
    family: Austronesian / Malayo-Polynesian
    script: Latin
    tydiqa_alias: indonesian
    datasets: [xcopa, xstory_cloze, global_mmlu_lite, mlqa, tydiqa_goldp]

  it:
    name: Italian
    family: Indo-European / Romance
    script: Latin
    datasets: [xcopa, global_mmlu_lite]

  ja:
    name: Japanese
    family: Japonic
    script: Japanese (Kanji / Hiragana / Katakana)
    tydiqa_alias: japanese
    datasets: [mgsm, global_mmlu_lite, tydiqa_goldp]

  ko:
    name: Korean
    family: Koreanic
    script: Hangul
    tydiqa_alias: korean
    datasets: [global_mmlu_lite, tydiqa_goldp]

  my:
    name: Burmese
    family: Sino-Tibetan / Tibeto-Burman
    script: Myanmar
    datasets: [xstory_cloze, global_mmlu_lite]

  pt:
    name: Portuguese
    family: Indo-European / Romance
    script: Latin
    datasets: [global_mmlu_lite]

  qu:
    name: Quechua
    family: Quechuan
    script: Latin
    datasets: [xcopa]

  ru:
    name: Russian
    family: Indo-European / Slavic
    script: Cyrillic
    tydiqa_alias: russian
    datasets: [mgsm, xstory_cloze, xnli, tydiqa_goldp]

  sq:
    name: Albanian
    family: Indo-European / Albanian
    script: Latin
    datasets: [global_mmlu_lite]

  sw:
    name: Swahili
    family: Niger-Congo / Bantu
    script: Latin
    tydiqa_alias: swahili
    datasets: [mgsm, xcopa, xstory_cloze, xnli, global_mmlu_lite, tydiqa_goldp]

  ta:
    name: Tamil
    family: Dravidian
    script: Tamil
    datasets: [xcopa]

  te:
    name: Telugu
    family: Dravidian
    script: Telugu
    tydiqa_alias: telugu
    datasets: [mgsm, xstory_cloze, tydiqa_goldp]

  th:
    name: Thai
    family: Kra-Dai / Tai
    script: Thai
    tydiqa_alias: thai
    datasets: [mgsm, xcopa, xnli, tydiqa_goldp]

  tr:
    name: Turkish
    family: Turkic
    script: Latin
    datasets: [xcopa, xnli]

  ur:
    name: Urdu
    family: Indo-European / Indo-Aryan
    script: Arabic
    datasets: [xnli]

  vi:
    name: Vietnamese
    family: Austroasiatic / Mon-Khmer
    script: Latin
    datasets: [xcopa, xnli, mlqa]

  yo:
    name: Yoruba
    family: Niger-Congo / Volta-Niger
    script: Latin
    datasets: [global_mmlu_lite]

  zh:
    name: Chinese (Simplified)
    family: Sino-Tibetan
    script: Chinese (Hanzi)
    datasets: [mgsm, xcopa, xstory_cloze, xnli, global_mmlu_lite, mlqa]
